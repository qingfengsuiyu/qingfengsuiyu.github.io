          <figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br></pre></td><td class="code"><pre><span class="line">mkdir /mnt/cdrom</span><br><span class="line">mount /dev/cdrom /mnt/cdrom/</span><br><span class="line"><span class="comment">#安装顺序</span></span><br><span class="line">rpm -ivh apr-1.3.9-3.e16_1.2.i686.rpm</span><br><span class="line">rpm -ivh apr-util-1.3.9-3.e16....</span><br><span class="line">rpm -ivh apr-util-ldap-1.3.9....</span><br><span class="line">rpm -ivh httpd-tools-2.2.15.e16...</span><br><span class="line">rpm -ivh httpd-2.2.15-15...</span><br><span class="line"></span><br><span class="line"><span class="comment">#然后编辑配置文件，修改一行代码</span></span><br><span class="line">vi /etc/httpd/conf/httpd.conf</span><br><span class="line"><span class="comment">#276 行，修改   /276</span></span><br><span class="line">ServerName 192.168.132.2:80</span><br><span class="line">service httpd start</span><br><span class="line"><span class="comment">#编辑主页文件</span></span><br><span class="line">vi /var/www/html/index.html</span><br><span class="line"><span class="comment">#关闭防火墙</span></span><br><span class="line">service iptables stop</span><br><span class="line"><span class="comment">#浏览器访问192.168.132.2/index.html</span></span><br></pre></td></tr></table></figure>

  <article class="post">
    <header class="post-header">
      <h1 class="post-title">
        
          <a class="post-link" href="/2018/12/22/ftp服务搭建/">ftp服务搭建</a>
        
      </h1>

      <div class="post-meta">
        <span class="post-time">
          2018-12-22
        </span>
        
        
      </div>
    </header>

    
    


    <div class="post-content">
      
        
        

        
          <figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># 创建并挂载</span></span><br><span class="line">mkdir /mnt/cdrom</span><br><span class="line">mount /dev/cdrom /mnt/cdrom/</span><br><span class="line"></span><br><span class="line"><span class="built_in">cd</span> /mnt/cdrom/Packages/</span><br><span class="line">rpm -ivh vsftpd-2.2.2-11.e16.e16.i686.rpm</span><br><span class="line"><span class="comment">#配置文件</span></span><br><span class="line">vi /etc/vsftpd/vsftpd.conf</span><br><span class="line"><span class="comment">#两个属性取消注释</span></span><br><span class="line">anon_upload_enables=YES</span><br><span class="line">anon_mkdir_write_enable=YES</span><br><span class="line"><span class="comment"># /anon_upload_enables 搜索</span></span><br><span class="line"><span class="comment">#服务启动和关闭防火墙</span></span><br><span class="line">service vsftpd start</span><br><span class="line">service iptables stop</span><br><span class="line"><span class="comment">#进入pub目录创建一个文件</span></span><br><span class="line"><span class="built_in">cd</span> /var/ftp/pub/  <span class="comment">#目录，此目录与windows共享</span></span><br><span class="line"><span class="comment">#顺便修改文件夹权限</span></span><br><span class="line">chmod 777 /var/ftp/pub/</span><br><span class="line">Vim /etc/selinux/config  </span><br><span class="line"><span class="comment">#修改</span></span><br><span class="line">selinux=disabled</span><br><span class="line"><span class="comment">#关闭防火墙 </span></span><br><span class="line">service iptables stop</span><br><span class="line"><span class="comment">#Next step : 重启主机</span></span><br><span class="line">service vsftpd start</span><br><span class="line">service iptables stop</span><br><span class="line"><span class="comment">#Windows ftp连接,并cd pub目录 get获取文件</span></span><br><span class="line"><span class="comment">#windows的共享目录在Users/Administeator</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#windows 下面 cmd命令行输入:</span></span><br><span class="line">ftp 192.168.132.2</span><br><span class="line"><span class="comment">#ftp 为默认账号，无密码</span></span><br><span class="line"><span class="built_in">cd</span> pub <span class="comment">#进入共享目录</span></span><br><span class="line">get xxx.txt <span class="comment">#从centerOs_Pub目录下 获取文件 在Users/Administeator下查看</span></span><br><span class="line">put xxx.txt <span class="comment">#从Users/Administeator推文件到center_Os 在pub目录下查看</span></span><br></pre></td></tr></table></figure>

  <article class="post">
    <header class="post-header">
      <h1 class="post-title">
        
          <a class="post-link" href="/2018/12/22/DHCP服务器搭建/">DHCP服务器搭建</a>
        
      </h1>

      <div class="post-meta">
        <span class="post-time">
          2018-12-22
        </span>
        
        
      </div>
    </header>

    
    


    <div class="post-content">
      
        
        

        
          <figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">ifconfig eth0 <span class="comment">#显示网卡信息</span></span><br><span class="line"></span><br><span class="line">vi /etc/sysconfig/network-scripts/ifcfg-eth0 <span class="comment">#修改配置文件</span></span><br><span class="line"></span><br><span class="line">内容:</span><br><span class="line">DEVICE=<span class="string">"eth0"</span></span><br><span class="line">BOOTPROTO=<span class="string">"static"</span></span><br><span class="line">HWADDR=<span class="string">"默认"</span></span><br><span class="line">ONBOOT=<span class="string">"yes"</span></span><br><span class="line">TYPE=<span class="string">"Ethernet"</span></span><br><span class="line">UUID=<span class="string">"默认"</span></span><br><span class="line">IPADDR=192.168.132.2</span><br><span class="line">NETMASK=255.255.255.0</span><br><span class="line">GATEWAY=192.168.132.2</span><br></pre></td></tr></table></figure>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line">service network restart <span class="comment">#服务重启</span></span><br><span class="line">mkdir /mnt/cdrom</span><br><span class="line">mount /dev/cdrom /mnt/cdrom</span><br><span class="line"><span class="comment"># then install dhepd serivice</span></span><br><span class="line"><span class="built_in">cd</span> /mnt/cdrom/Packages/</span><br><span class="line">rpm -ivh install dhcp-4.1.1-31.P1 <span class="comment">#TABLE补全</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 编辑DHCPD的配置文件</span></span><br><span class="line">vi /etc/dhcp/dhcpd.conf</span><br><span class="line"><span class="comment">#add below content</span></span><br><span class="line">ddns-update-style interim;</span><br><span class="line">ignore client-updates;</span><br><span class="line">default-lease-time 21600;</span><br><span class="line">max-lease-time 43200;</span><br><span class="line">subnet 192.168.132.0 netmast 255.255.255.0&#123;</span><br><span class="line">range 192.168.132.100 192.168.132.110;</span><br><span class="line">option subnet-mask 255.255.255.0;</span><br><span class="line">option domain-name <span class="string">"xiaoyi.com"</span>;</span><br><span class="line">option routers 192.168.132.254;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">service dhcpd start</span><br><span class="line"><span class="comment"># 关闭主机，克隆主机，并且启动主机后，启动dhcpd服务，然后编辑克隆的主机，如下命令</span></span><br><span class="line">vi /etc/sysconfig/network-scripts/ifcfg-eth1 <span class="comment">#网卡1</span></span><br><span class="line"></span><br><span class="line">DEVICE=<span class="string">"eht1"</span></span><br><span class="line">BOOTPROTO=<span class="string">"dhcp"</span></span><br><span class="line">ONBOOT=<span class="string">"yes"</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 退出后，执行 ifup eth1 启动网卡1，发现网卡地址已经分配，如果必要启动dhcpd服务</span></span><br><span class="line">service dhcpd start</span><br></pre></td></tr></table></figure>

        
      
    </div>
