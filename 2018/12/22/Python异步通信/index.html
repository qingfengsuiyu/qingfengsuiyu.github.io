    <div class="post-content">
      
        <figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># 服务器端</span></span><br><span class="line"><span class="comment">#coding:utf-8</span></span><br><span class="line"><span class="keyword">import</span> socket,select</span><br><span class="line"></span><br><span class="line"><span class="comment"># TCP</span></span><br><span class="line">server = socket.socket(socket.AF_INET,socket.SOCK_STREAM)</span><br><span class="line"></span><br><span class="line"><span class="comment"># S.setsockopt(socket.SOL_SOCKET,socket.SO_REUSEADDR,1) 这里value</span></span><br><span class="line"><span class="comment"># 设置为1，表示将SO_REUSEADDR标记为TRUE，操作系统会在服务器socket被关闭或</span></span><br><span class="line"><span class="comment"># 服务器进程终止后马上释放该服务器的端口，否则操作系统会保留几分钟该端口。</span></span><br><span class="line">server.setsockopt(socket.SOL_SOCKET,socket.SO_REUSEADDR,<span class="number">1</span>)</span><br><span class="line"></span><br><span class="line">server.bind((<span class="string">"10.200.184.247"</span>,<span class="number">1888</span>))</span><br><span class="line"><span class="comment">#A连接后还可以在连接4个人，在多的人就无法连接。一共5个人可以排队</span></span><br><span class="line">server.listen(<span class="number">5</span>)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="string">'''</span></span><br><span class="line"><span class="string">select 有三个表(自定义)，input接受消息，output 回消息，error 错误信息</span></span><br><span class="line"><span class="string">select,会循环遍历每一个列表。不停的遍历默认1024文件描述符。不管有没有对象真的占用描述符都会一直循环，</span></span><br><span class="line"><span class="string">并且一个对象都没有的时候将进入阻塞状态</span></span><br><span class="line"><span class="string">'''</span></span><br><span class="line"><span class="comment">#这里必须这样写把server放进去，新的连接信息其实并不会加入这个列表中去。这个列表始终只有server</span></span><br><span class="line">inputs = [server]</span><br><span class="line"></span><br><span class="line"><span class="comment"># print(inputs)</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># ------- 以下写到空列表中</span></span><br><span class="line"><span class="comment"># rs,ws,es = select.select(inputs,[],[],1)</span></span><br><span class="line"><span class="comment">#这个链列表是存储要发消息的连接对象</span></span><br><span class="line"><span class="comment"># outputs=[]</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#这个队列是存放每个对象发过来的消息</span></span><br><span class="line"><span class="comment"># message_queues=&#123;&#125;</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">while</span> <span class="number">1</span>:</span><br><span class="line"><span class="comment"># 在python中，select函数是一个对底层操作系统的直接访问的接口。它用来监控sockets、</span></span><br><span class="line"><span class="comment"># files和pipes，等待IO完成（Waiting for I/O completion）。当有可读、可写或</span></span><br><span class="line"><span class="comment"># 是异常事件产生时，select可以很容易的监控到。 </span></span><br><span class="line"><span class="comment"># select.select（rlist, wlist, xlist[, timeout]） 传递三个参数，一个为输入</span></span><br><span class="line"><span class="comment"># 而观察的文件对象列表，一个为输出而观察的文件对象列表和一个观察错误异常的文件列表。</span></span><br><span class="line"><span class="comment"># 第四个是一个可选参数，表示超时秒数。其返回3个tuple，每个tuple都是一个准备好的对</span></span><br><span class="line"><span class="comment"># 象列表，它和前边的参数是一样的顺序。</span></span><br><span class="line"></span><br><span class="line">	rs,ws,es = select.select(inputs,[],[],<span class="number">1</span>)</span><br><span class="line">	<span class="keyword">for</span> r <span class="keyword">in</span> rs:</span><br><span class="line">		<span class="keyword">if</span> r <span class="keyword">is</span> server:</span><br><span class="line">			clientsock,clientaddr=r.accept()</span><br><span class="line">			<span class="comment"># print(clientsock)</span></span><br><span class="line">			<span class="comment"># 并把连接添加到Input列表里面</span></span><br><span class="line">			inputs.append(clientsock)</span><br><span class="line">		<span class="keyword">else</span>:</span><br><span class="line">			<span class="comment"># 连接接收数据</span></span><br><span class="line">			data = r.recv(<span class="number">1024</span>)</span><br><span class="line">			<span class="keyword">if</span> <span class="keyword">not</span> data:</span><br><span class="line">			<span class="comment"># 没有数据移除其中一个连接</span></span><br><span class="line">				inputs.remove(r)</span><br><span class="line">			<span class="keyword">else</span>:</span><br><span class="line">				print(data)</span><br></pre></td></tr></table></figure>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># 客户端</span></span><br><span class="line"><span class="keyword">import</span> socket</span><br><span class="line">host = <span class="string">'10.200.184.247'</span></span><br><span class="line">port = <span class="number">1888</span></span><br><span class="line">s =socket.socket(socket.AF_INET,socket.SOCK_STREAM)</span><br><span class="line">s.connect((host,port))</span><br><span class="line"></span><br><span class="line"><span class="keyword">while</span> <span class="keyword">True</span>:</span><br><span class="line">    mes = bytes(input(<span class="string">"Client  input data:"</span>),encoding=<span class="string">'utf-8'</span>)</span><br><span class="line">    <span class="keyword">if</span> mes == <span class="string">'q'</span>:</span><br><span class="line">        print(<span class="string">'it is break'</span>)</span><br><span class="line">        <span class="keyword">break</span></span><br><span class="line">    s.send(mes)</span><br><span class="line">    <span class="comment"># data,address = s.recvfrom(1024)</span></span><br><span class="line">    <span class="comment"># print("This is data of Service:&gt;&gt;&gt;&gt;&gt;&gt;",data)</span></span><br><span class="line"></span><br><span class="line">s.close()</span><br></pre></td></tr></table></figure>
