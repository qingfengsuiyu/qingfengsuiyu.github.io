        <figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#conding:utf8</span></span><br><span class="line"><span class="keyword">import</span> threading</span><br><span class="line"><span class="keyword">import</span> time </span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">run1</span><span class="params">(cond,name)</span>:</span></span><br><span class="line">	cond.acquire() <span class="comment"># 申请</span></span><br><span class="line">	print(name+<span class="string">" I am run1,1"</span>)</span><br><span class="line">	cond.notify() <span class="comment"># 唤起run2_1</span></span><br><span class="line">	cond.wait() <span class="comment"># 阻塞本线程</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">	print(name+<span class="string">"I am run1,2"</span>)</span><br><span class="line">	cond.notify() <span class="comment">#唤起run2_2</span></span><br><span class="line">	cond.wait()</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">run2</span><span class="params">(coda,name)</span>:</span></span><br><span class="line">	cond.acquire() <span class="comment"># 申请</span></span><br><span class="line">	print(name+<span class="string">" I am run2,1"</span>)</span><br><span class="line">	cond.notify() <span class="comment"># 唤起run1_2</span></span><br><span class="line">	cond.wait()	<span class="comment"># 阻塞本线程</span></span><br><span class="line"></span><br><span class="line">	print(name+<span class="string">"I am run2,2"</span>)</span><br><span class="line">	cond.notify()</span><br><span class="line">	cond.release()</span><br><span class="line"></span><br><span class="line">cond = threading.Condition()</span><br><span class="line">t1 = threading.Thread(target=run1,args=(cond,<span class="string">"xiaoyi"</span>,))</span><br><span class="line">t2 = threading.Thread(target=run2,args=(cond,<span class="string">"xiaohuang"</span>))</span><br><span class="line">t1.start()</span><br><span class="line">t2.start()</span><br><span class="line">t1.join()</span><br><span class="line">t2.join()</span><br></pre></td></tr></table></figure>
